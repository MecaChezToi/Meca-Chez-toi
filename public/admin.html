<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meca'Admin — Gestion</title>
<meta name="theme-color" content="#b35c2e">
<style>
:root {
  --bg:#0b0806;
  --panel:#18110d;
  --paper:#f1e2c6;
  --rust:#b35c2e;
  --teal:#2e8d97;
  --gold:#cf9f5b;
  --line:rgba(255,255,255,.08);
}
body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--paper);
  background:#090705;
}
.app {
  display:flex;
  flex-direction:column;
  height:100vh;
}
.header {
  padding:15px;
  background:var(--panel);
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.header strong { font-size:1.4rem; color:var(--teal); }
.content {
  flex:1;
  overflow-y:auto;
  padding:15px;
}
.navbar {
  display:flex;
  background:var(--panel);
  border-top:1px solid var(--line);
}
.nav-item {
  flex:1;
  padding:15px;
  text-align:center;
  cursor:pointer;
  font-size:.8rem;
  text-transform:uppercase;
  color:rgba(241,226,198,.5);
}
.nav-item.active {
  color:var(--rust);
  background:rgba(255,255,255,.02);
}
.card {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:15px;
  margin-bottom:15px;
}
.status {
  display:inline-block;
  padding:4px 8px;
  border-radius:99px;
  font-size:.7rem;
  text-transform:uppercase;
  margin-bottom:8px;
}
.status.pending { background:rgba(207,159,91,.1); color:var(--gold); }
.status.confirmed { background:rgba(46,141,151,.1); color:var(--teal); }
.status.done { background:rgba(255,255,255,.05); color:var(--paper); }

.inventory-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid var(--line);
}
.inventory-item:last-child { border-bottom:none; }
.stock-badge {
  padding:5px 10px;
  border-radius:8px;
  background:rgba(255,255,255,.05);
}
.stock-badge.low {
  background:rgba(179,92,46,.2);
  color:var(--rust);
  border:1px solid var(--rust);
}
.btn-mini {
  padding:6px 10px;
  border-radius:8px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:var(--paper);
  font-size:.7rem;
  cursor:pointer;
}
.hidden { display:none; }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <strong>Meca'<span>Admin</span></strong>
    <span id="dateHeader"></span>
  </header>

  <main class="content" id="mainContent">
    <!-- Appointments View -->
    <div id="view-appointments">
      <h2>Rendez-vous</h2>
      <div id="appointmentsList">Chargement...</div>
    </div>

    <!-- Inventory View -->
    <div id="view-inventory" class="hidden">
      <h2>Gestion des Stocks</h2>
      <div id="inventoryList">Chargement...</div>
    </div>
  </main>

  <nav class="navbar">
    <div class="nav-item active" onclick="switchView('appointments')">
      <div style="font-size:1.5rem;">📅</div>
      RDV
    </div>
    <div class="nav-item" onclick="switchView('inventory')">
      <div style="font-size:1.5rem;">📦</div>
      Stocks
    </div>
  </nav>
</div>

<script type="module">
// Import the functions you need from the SDKs you need
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAHfVNqdUTMEfLm1HVS4a4NI7jZITY7vd8",
  authDomain: "meca-chez-toi.firebaseapp.com",
  projectId: "meca-chez-toi",
  storageBucket: "meca-chez-toi.firebasestorage.app",
  messagingSenderId: "1032193346823",
  appId: "1:1032193346823:web:9e55d41d1acf7b8ca1c9a2",
  measurementId: "G-DG7ZJNQQR7"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.switchView = function(view) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
  
  const targetNav = document.querySelector(`.nav-item[onclick*="${view}"]`);
  if (targetNav) targetNav.classList.add('active');
  
  const targetView = document.getElementById(`view-${view}`);
  if (targetView) targetView.classList.remove('hidden');
};

// Écouter les rendez-vous en temps réel
function listenToAppointments() {
  const q = query(collection(db, "rdv"), orderBy("createdAt", "desc"));
  onSnapshot(q, (querySnapshot) => {
    const list = document.getElementById('appointmentsList');
    const rdvs = [];
    querySnapshot.forEach((doc) => {
      const app = doc.data();
      app.id = doc.id;
      rdvs.push(app);
    });
    
    list.innerHTML = rdvs.map(app => {
      const clientName = app.name || app.client || (app.prenom + " " + app.nom) || "Client Inconnu";
      const fullAddr = app.adresse_complete || app.adresse || app.address || app.localisation || app.lieu || "Non spécifié";
      const displayTime = app.heure || app.creneau || app.slot || app.time || "N/A";
      const displayPrice = app.prix || app.price || app.tarif || app.montant || "À définir";

      return `
        <div class="card">
          <span class="status ${app.status || 'pending'}">${app.status || 'En attente'}</span>
          <span style="float:right; color:var(--gold); font-weight:bold;">${displayPrice}</span>
          <h3>${clientName}</h3>
          <p>📅 ${app.date || 'N/A'} • ⏰ ${displayTime}</p>
          <p>📍 ${fullAddr}</p>
          <p>🚗 ${app.vehicule || app.vehicle || 'N/A'} (${app.service || 'N/A'})</p>
          <p>🆔 VIN: ${app.vin || 'Non précisé'}</p>
          <p>📞 ${app.telephone || app.phone || 'N/A'}</p>
          <p>💬 ${app.commentaire || app.comment || app.message || 'Pas de message'}</p>
          <div style="margin-top:10px; display:flex; gap:10px;">
            ${app.status === 'pending' || !app.status ? `<button class="btn-mini" onclick="updateStatus('${app.id}', 'confirmed')">Confirmer</button>` : ''}
            ${app.status !== 'done' ? `<button class="btn-mini" onclick="updateStatus('${app.id}', 'done')">Terminé</button>` : ''}
            <a class="btn-mini" style="text-decoration:none;" href="https://waze.com/ul?q=${encodeURIComponent(fullAddr)}&navigate=yes">🚗 Waze</a>
          </div>
        </div>
      `;
    }).join('') || 'Aucun rendez-vous.';
  });
}

window.updateStatus = async function(id, status) {
  try {
    const rdvRef = doc(db, "rdv", id);
    await updateDoc(rdvRef, { status });
  } catch (e) {
    console.error("Erreur mise à jour:", e);
    alert("Erreur lors de la mise à jour");
  }
};

document.getElementById('dateHeader').textContent = new Date().toLocaleDateString('fr-FR');
listenToAppointments();
</script>
</body>
</html>
